<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>配信スケジュール</title>

  <style>
    :root {
      --bg: #0f0f0f;
      --text: #f5f5f5;
      --sub: #b5b5b5;
      --accent: #cd74e6;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, "Noto Sans JP", sans-serif;
      line-height: 1.6;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 16px 48px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 8px;
    }

    .note {
      color: var(--sub);
      font-size: 0.95rem;
      margin-bottom: 20px;
    }

    .note span {
      color: var(--accent);
      font-weight: 600;
    }

    .calendar-wrap {
      position: relative;
      width: 100%;
      padding-top: 75%; /* アスペクト比 */
    }

    .calendar-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    @media (max-width: 600px) {
      .calendar-wrap {
        padding-top: 120%;
      }
    }
  </style>
</head>

<body>
  <main>
    <h1>配信スケジュール</h1>

    <div class="note">
      <p>
        <span>Live配信：</span>不定期（目安 16:45〜）<br />
        <span>Shorts：</span>毎週金曜日 18:45〜
      </p>
    </div>

    <div class="calendar-wrap">
      <iframe
        src="https://calendar.google.com/calendar/u/0/embed?color=%23cd74e6&src=9023ce9f73f72004d06ca537a6404d3f746e8c09a2504e43f4c1eb3a"
        scrolling="no">
      </iframe>
    </div>
  </main>
</body>
</html>
