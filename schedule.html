<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Schedule | やらはじ</title>

  <!-- 共通JS -->
  <script src="/main/js/header.js" defer></script>
  <script src="/main/js/theme.js" defer></script>

  <style>
    :root {
      --bg: #ffffff;
      --text: #111;
      --sub: #666;
      --border: rgba(0,0,0,0.1);
      --accent: #cd74e6;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 96px 24px 32px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 16px;
    }

    .schedule-info {
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 24px;
      font-size: 0.95rem;
    }

    .schedule-info strong {
      color: var(--accent);
    }

    .calendar-wrap {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .calendar-wrap iframe {
      width: 100%;
      height: 700px;
      border: 0;
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.85rem;
      color: var(--sub);
      border-top: 1px solid var(--border);
      margin-top: 48px;
    }
  </style>
</head>

<body>
  <!-- header.js がヘッダーを挿入 -->

  <main>
    <h1>Schedule</h1>

    <div class="schedule-info">
      <p>
        <strong>Live配信：</strong> 不定期（目安 <strong>16:45〜</strong>）<br>
        <strong>Shorts：</strong> 毎週金曜日 <strong>18:45〜</strong>
      </p>
      <p style="margin: 0;">
        ※ 正確な日時は下のカレンダーをご確認ください。
      </p>
    </div>

    <div class="calendar-wrap">
      <iframe
        src="https://calendar.google.com/calendar/u/0/embed?color=%23cd74e6&src=9023ce9f73f72004d06ca537a6404d3f746e8c09a2504e43f4c1eb3a815d3fbf@group.calendar.google.com"
        scrolling="no">
      </iframe>
    </div>
  </main>

  <footer>
    © 2026 yarahazi
  </footer>
</body>
</html>
