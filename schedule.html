<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Schedule | やらはじ公式サイト</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header.css">

  <style>
    .schedule-page {
      max-width: 1000px;
      margin: 120px auto 80px;
      padding: 0 20px;
      box-sizing: border-box;
    }

    .schedule-page h1 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    .schedule-note {
      font-size: 0.9rem;
      color: var(--text-sub);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .calendar-wrapper {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    .calendar-wrapper iframe {
      width: 100%;
      height: 600px;
      border: none;
    }

    @media (max-width: 768px) {
      .calendar-wrapper iframe {
        height: 500px;
      }
    }
  </style>
</head>

<body>

<div id="header"></div>

<main class="schedule-page">
  <h1>Schedule</h1>

  <div class="schedule-note">
    ・Live配信：不定期 16:45〜<br>
    ・Shorts：毎週金曜日 18:45〜
  </div>

  <div class="calendar-wrapper">
    <iframe
      src="https://calendar.google.com/calendar/u/0/embed?color=%23cd74e6&src=9023ce9f73f72004d06ca537a6404d3f746e8c09a2504e43f4c1eb3a"
      frameborder="0"
      scrolling="no">
    </iframe>
  </div>
</main>

<button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
  <span class="theme-icon" id="theme-icon">◐</span>
</button>

<div id="footer"></div>

<!-- 🔥 順番が超重要 -->
<script src="js/header.js"></script>
<script src="js/theme.js"></script>
<script src="common.js"></script>

</body>
</html>
