<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>やらはじ公式サイト</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header.css">
</head>

<body>

<!-- Header -->
<div id="header"></div>

<!-- Main -->
<!-- Hero Carousel -->
<section class="carousel">
  <div class="carousel-track" id="carousel-track">

    <!-- スライド1 -->
    <div class="slide">
      <picture>
        <source media="(max-width: 768px)" srcset="image/index/carousel/newsite_sp.png">
        <img src="image/index/carousel/newsite_pc.png" alt="やらはじ公式サイト">
      </picture>
    </div>

    <!-- スライド2（YouTube） -->
    <div class="slide">
      <a href="http://www.youtube.com/@yarahazi_nnp" target="_blank" rel="noopener noreferrer">
        <picture>
          <source media="(max-width: 768px)" srcset="image/index/carousel/youtube_sp.png">
          <img src="image/index/carousel/youtube_pc.png" alt="やらはじ YouTube">
        </picture>
      </a>
    </div>

  </div>

  <!-- 矢印 -->
  <button class="carousel-btn prev" id="prev" aria-label="前へ">&#10094;</button>
  <button class="carousel-btn next" id="next" aria-label="次へ">&#10095;</button>

  <!-- ドット -->
  <div class="carousel-dots" id="carousel-dots"></div>
</section>

<!-- News -->
<section class="news-section">
  <div class="news-inner">
    <h2>NEWS</h2>

    <div id="news-list">
      <!-- microCMSの最新記事3件をJavaScriptで表示 -->
    </div>

    <div class="news-more">
      <a href="news.html">一覧を見る →</a>
    </div>
  </div>
</section>

<!-- About -->
<section class="about-section">
  <div class="about-inner">

    <div class="about-text">
      <h2>ABOUT</h2>

      <dl class="profile-list">
        <dt>名前</dt>
        <dd>やらはじ</dd>

        <dt>性別</dt>
        <dd>男の子</dd>

        <dt>配信開始日</dt>
        <dd>2021.04.18</dd>

        <dt>コメント</dt>
        <dd>
          どうもみなさんこんにちは、やらはじです！<br>
          ”やりたいことをやりたい時に全力で楽しむ！”を目標に、YouTubeをメインに活動しています。
        </dd>

        <div class="about-more">
          <a href="about.html">詳しく見る →</a>
        </div>
      </dl>
    </div>

    <div class="about-image">
      <img src="image/index/yarahazi.png" alt="やらはじ">
    </div>

  </div>
</section>

<!-- Footer -->
<div id="footer"></div>

<!-- Theme Toggle -->
<button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
  <span class="theme-icon" id="theme-icon">◐</span>
</button>

<!-- Scripts（順番が重要） -->
<script src="js/header.js"></script>
<script src="js/theme.js"></script>
<script src="/common.js"></script>
<script src="js/carousel.js"></script>
<script src="js/news.js"></script>

</body>
</html>
