<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>News | やらはじ公式サイト</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header.css">

  <style>
    /* ==========================
       ページ全体の縦並び
    ========================== */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh; /* 最低でも画面高さ分 */
    }

    main {
      flex: 1; /* mainが余白を埋める */
      max-width: 800px;
      margin: 120px auto 80px;
      padding: 0 20px;
      box-sizing: border-box;
      width: 100%;
    }

    /* ==========================
       News詳細ページ用スタイル
    ========================== */
    .news-detail-title {
      font-size: 1.8rem;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .news-meta {
      font-size: 0.85rem;
      margin-bottom: 30px;
      color: var(--sub, #777);
    }

    .news-body {
      line-height: 1.9;
      font-size: 1rem;
    }

    .news-body img {
      max-width: 100%;
      border-radius: 12px;
    }

    /* ==========================
       Footerスタイル（任意）
    ========================== */
    #footer {
      background-color: var(--bg);
      padding: 20px;
      text-align: center;
      border-top: 1px solid var(--line, rgba(0,0,0,0.1));
    }
  </style>
</head>

<body>

<!-- 共通ヘッダー -->
<div id="header"></div>

<main class="news-detail-page">
  <h1 class="news-detail-title" id="title"></h1>
  <div class="news-meta" id="meta"></div>
  <div class="news-body" id="body">読み込み中…</div>
</main>

<button class="theme-toggle" id="theme-toggle">
  <span class="theme-icon" id="theme-icon">◐</span>
</button>

<!-- 共通フッター -->
<div id="footer"></div>

<script src="common.js"></script>
<script src="js/header.js"></script>
<script src="js/theme.js"></script>

<script>
const API_KEY = "AdcI8a9AAzyT78lwCGW1IusX5cEt23fy53m9";
const SERVICE_URL = "https://yarahazi.microcms.io/api/v1/news/";
const params = new URLSearchParams(location.search);
const id = params.get("id");

/* 日付フォーマット関数 */
function formatDate(dateStr) {
  if (!dateStr) return "";

  // ISO形式対応
  if (dateStr.includes("T")) {
    return dateStr.split("T")[0].replace(/-/g, ".");
  }

  // YYYY-MM-DD形式
  return dateStr.replace(/-/g, ".");
}

if (!id) {
  document.getElementById("body").innerHTML = "記事が見つかりません";
} else {

  fetch(SERVICE_URL + id, {
    headers: { "X-MICROCMS-API-KEY": API_KEY }
  })
  .then(res => {
    if (!res.ok) throw new Error("取得失敗");
    return res.json();
  })
  .then(item => {

    const date = formatDate(item.date || item.publishedAt);

    // タイトル反映
    document.getElementById("title").textContent = item.title;
    document.title = item.title + " | やらはじ公式サイト";

    // メタ情報
    document.getElementById("meta").textContent =
      `${date}${item.category ? " / " + item.category : ""}`;

    // 本文
    document.getElementById("body").innerHTML = item.body;

  })
  .catch(() => {
    document.getElementById("body").innerHTML =
      "記事の取得に失敗しました";
  });
}
</script>

</body>
</html>
