<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>News | やらはじ公式サイト</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header.css">

  <style>
    .news-detail-page {
      max-width: 800px;
      margin: 120px auto 80px;
      padding: 0 20px;
      box-sizing: border-box;
    }

    .news-detail-page h1 {
      margin-bottom: 10px;
    }

    .news-meta {
      color: var(--text-sub);
      font-size: 0.85rem;
      margin-bottom: 24px;
    }

    .news-body {
      line-height: 1.9;
    }
  </style>
</head>

<body>

<!-- 共通ヘッダー -->
<div id="header"></div>

<main class="news-detail-page">
  <h1 id="title"></h1>
  <div class="news-meta" id="meta"></div>
  <div class="news-body" id="body">読み込み中…</div>
</main>

<button class="theme-toggle" id="theme-toggle">
  <span class="theme-icon" id="theme-icon">◐</span>
</button>

<!-- 共通フッター -->
<div id="footer"></div>

<!-- 共通JS -->
<script src="common.js"></script>
<script src="js/header.js"></script>
<script src="js/theme.js"></script>

<script>
const API_KEY = "AdcI8a9AAzyT78lwCGW1IusX5cEt23fy53m9";
const params = new URLSearchParams(location.search);
const id = params.get("id");

if (!id) {
  document.getElementById("body").innerHTML = "記事が見つかりません";
} else {
  fetch(`https://yarahazi.microcms.io/api/v1/news/${id}`, {
    headers: { "X-MICROCMS-API-KEY": API_KEY }
  })
  .then(res => res.json())
  .then(item => {
    const date = item.date
      ? item.date.replace(/-/g, ".")
      : "";

    document.getElementById("title").textContent = item.title;
    document.getElementById("meta").textContent =
      `${date}${item.category ? " / " + item.category : ""}`;
    document.getElementById("body").innerHTML = item.body;
  })
  .catch(() => {
    document.getElementById("body").innerHTML = "記事の取得に失敗しました";
  });
}
</script>

</body>
</html>
