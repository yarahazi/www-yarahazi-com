<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>お問い合わせ|やらはじ公式サイト</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header.css">
</head>

<body>

<!-- Header -->
<div id="header"></div>

<!-- Main -->
<main class="container">

  <div class="main-text">
    Contact
  </div>

  <p style="
    text-align:center;
    margin-top:20px;
    margin-bottom:40px;
  ">
    ご質問・ご依頼はこちらからお願いします。
  </p>

  <div style="
    display:flex;
    justify-content:center;
    width:100%;
  ">

    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSf1dz19D8eZgjC0QyIjqz4ts9MC7BRJArZi8dDHCFx6j0-u3A/viewform?embedded=true"
      width="100%"
      height="889"
      frameborder="0"
      marginheight="0"
      marginwidth="0"
      style="
        max-width:800px;
        border:none;
        border-radius:12px;
        background:white;
      "
    >
      読み込んでいます…
    </iframe>

  </div>

</main>

<!-- Footer -->
<div id="footer"></div>

<!-- Theme Toggle -->
<button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
  <span class="theme-icon" id="theme-icon">◐</span>
</button>

<!-- Scripts -->
<script src="js/header.js"></script>
<script src="js/theme.js"></script>
<script src="/common.js"></script>

</body>
</html>
