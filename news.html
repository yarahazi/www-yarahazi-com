<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>News | やらはじ公式サイト</title>

  <!-- 共通CSS（※ 絶対パスで統一） -->
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/header.css">

  <!-- =========================
       News 専用デザイン
  ========================= -->
  <style>
    .container.news-page {
      display: block;
      height: auto;
      max-width: 1000px;
      margin: 100px auto 80px;
      padding: 0 20px;
      box-sizing: border-box;
    }

    .news-item {
      padding: 24px 0;
      border-bottom: 1px solid var(--line, rgba(0,0,0,0.1));
    }

    .news-date {
      font-size: 0.85rem;
      opacity: 0.7;
    }

    .news-title {
      font-size: 1.3rem;
      margin: 6px 0 10px;
    }

    .news-body {
      line-height: 1.8;
    }
  </style>
</head>

<body>

<!-- =========================
     Header（共通）
========================= -->
<header class="site-header" id="site-header">
  <div class="header-inner">
    <div class="site-logo">やらはじ</div>

    <nav class="site-nav" id="site-nav">
      <a href="/about.html">About</a>
      <a href="/news.html" aria-current="page">News</a>
      <a href="/schedule.html">Schedule</a>
      <a href="/profile.html">Profile</a>
      <a href="/guideline.html">Guideline</a>
      <a href="/contact.html">Contact</a>
    </nav>

    <button class="menu-toggle" id="menu-toggle" aria-label="Menu">
      ≡
    </button>
  </div>
</header>

<!-- =========================
     Main
========================= -->
<main class="container news-page">
  <h1>News</h1>
  <div id="newsList">読み込み中…</div>
</main>

<!-- =========================
     Theme Toggle
========================= -->
<button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
  <span class="theme-icon" id="theme-icon">◐</span>
</button>

<!-- =========================
     Footer
========================= -->
<div id="footer"></div>

<!-- =========================
     Scripts（※ 絶対パス）
========================= -->
<script src="/js/header.js"></script>
<script src="/js/theme.js"></script>
<script src="/common.js"></script>

<script>
  const SERVICE_ID = "yarahazi";
  const API_KEY = "ここにAPIキー";
  const ENDPOINT = "news";

  fetch(`https://${SERVICE_ID}.microcms.io/api/v1/${ENDPOINT}`, {
    headers: {
      "X-MICROCMS-API-KEY": API_KEY
    }
  })
    .then(res => res.json())
    .then(data => {
      const list = document.getElementById("newsList");
      list.innerHTML = "";

      data.contents.forEach(item => {
        const date = new Date(item.publishedAt).toLocaleDateString("ja-JP");

        const article = document.createElement("article");
        article.className = "news-item";

        article.innerHTML = `
          <div class="news-date">${date}</div>
          <h2 class="news-title">${item.title}</h2>
          <div class="news-body">${item.body?.html ?? ""}</div>
        `;

        list.appendChild(article);
      });
    })
    .catch(() => {
      document.getElementById("newsList").textContent =
        "Newsの取得に失敗しました";
    });
</script>

</body>
</html>
