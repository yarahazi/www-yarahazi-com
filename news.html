<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>News | やらはじ</title>

  <!-- 共通CSS（schedule.htmlと同じもの） -->
  <link rel="stylesheet" href="common.css" />

  <style>
    /* newsページ固有だけここに書く */
    .news-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    .news-item {
      padding: 20px 0;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }

    [data-theme="dark"] .news-item {
      border-color: rgba(255,255,255,0.15);
    }

    .news-date {
      font-size: 0.85rem;
      opacity: 0.7;
    }

    .news-title {
      font-size: 1.2rem;
      margin: 6px 0 8px;
    }

    .news-body {
      line-height: 1.7;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <!-- ===== 共通ヘッダー（schedule.htmlと同じ） ===== -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo">やらはじ</a>
      <nav class="site-nav">
        <a href="news.html">News</a>
        <a href="schedule.html">Schedule</a>
      </nav>
      <button id="themeToggle" aria-label="テーマ切り替え">◐</button>
    </div>
  </header>

  <!-- ===== メイン ===== -->
  <main class="news-wrapper">
    <h1>News</h1>
    <div id="newsList">読み込み中…</div>
  </main>

  <!-- ===== 共通フッター ===== -->
  <footer class="site-footer">
    <small>© やらはじ</small>
  </footer>

  <!-- ===== 共通JS（schedule.htmlと同じ） ===== -->
  <script src="common.js"></script>

  <!-- ===== news取得JS ===== -->
  <script>
    const SERVICE_ID = "yarahazi";
    const API_KEY = "AdcI8a9AAzyT78lwCGW1IusX5cEt23fy53m9";
    const ENDPOINT = "news";

    fetch(`https://${SERVICE_ID}.microcms.io/api/v1/${ENDPOINT}`, {
      headers: {
        "X-MICROCMS-API-KEY": API_KEY
      }
    })
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById("newsList");
        list.innerHTML = "";

        data.contents.forEach(item => {
          const article = document.createElement("article");
          article.className = "news-item";

          article.innerHTML = `
            <div class="news-date">${item.publishedAt?.slice(0,10)}</div>
            <h2 class="news-title">${item.title}</h2>
            <div class="news-body">${item.body}</div>
          `;

          list.appendChild(article);
        });
      })
      .catch(err => {
        document.getElementById("newsList").textContent = "Newsの取得に失敗しました";
        console.error(err);
      });
  </script>

</body>
</html>
