<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>News | やらはじ</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #111;
      --sub: #666;
      --border: rgba(0,0,0,0.08);
      --card: #f7f7f7;
      --accent: #cd74e6;
    }

    html[data-theme="dark"] {
      --bg: #0f0f0f;
      --text: #f5f5f5;
      --sub: #aaa;
      --border: rgba(255,255,255,0.1);
      --card: #1a1a1a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ===== header ===== */
    .site-header {
      position: fixed;
      top: 0;
      width: 100%;
      height: 64px;
      background: color-mix(in srgb, var(--bg) 80%, transparent);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
    }

    .header-inner {
      max-width: 1100px;
      height: 100%;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-title {
      font-weight: 600;
      text-decoration: none;
      color: var(--text);
    }

    nav a {
      margin-left: 16px;
      text-decoration: none;
      color: var(--sub);
      font-size: 14px;
    }

    nav a:hover {
      color: var(--text);
    }

    .theme-toggle {
      margin-left: 16px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text);
      font-size: 16px;
    }

    /* ===== main ===== */
    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 120px 16px 80px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 32px;
    }

    .news-list {
      display: grid;
      gap: 24px;
    }

    article {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
    }

    .news-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--sub);
      margin-bottom: 8px;
    }

    .category {
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: var(--accent);
      color: #fff;
    }

    h2 {
      font-size: 18px;
      margin: 8px 0 12px;
    }

    .news-body {
      font-size: 14px;
      line-height: 1.7;
    }

    .news-body a {
      color: var(--accent);
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: var(--sub);
      padding: 40px 0;
      border-top: 1px solid var(--border);
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-title">やらはじ</a>
      <nav>
        <a href="news.html">News</a>
        <a href="schedule.html">Schedule</a>
        <button class="theme-toggle" id="themeToggle">◐</button>
      </nav>
    </div>
  </header>

  <main>
    <h1>News</h1>
    <section class="news-list" id="newsList">
      <p>読み込み中…</p>
    </section>
  </main>

  <footer>
    © やらはじ
  </footer>

  <script>
    /* ===== theme toggle ===== */
    const toggle = document.getElementById("themeToggle");
    const html = document.documentElement;

    toggle.addEventListener("click", () => {
      const current = html.getAttribute("data-theme");
      html.setAttribute(
        "data-theme",
        current === "dark" ? "light" : "dark"
      );
    });

    /* ===== microCMS ===== */
    const SERVICE_ID = "yarahazi";
    const API_KEY = "ここにAPIキーを貼る"; // ← 実キーに置き換え

    fetch(`https://${SERVICE_ID}.microcms.io/api/v1/news?orders=-date`, {
      headers: {
        "X-MICROCMS-API-KEY": API_KEY
      }
    })
      .then(res => {
        if (!res.ok) throw new Error("API Error");
        return res.json();
      })
      .then(data => {
        const list = document.getElementById("newsList");
        list.innerHTML = "";

        if (data.contents.length === 0) {
          list.innerHTML = "<p>記事がありません。</p>";
          return;
        }

        data.contents.forEach(item => {
          const article = document.createElement("article");

          article.innerHTML = `
            <div class="news-meta">
              <time>${item.date}</time>
              <span class="category">${item.category}</span>
            </div>
            <h2>${item.title}</h2>
            <div class="news-body">${item.body}</div>
            ${item.link ? `<p><a href="${item.link}" target="_blank" rel="noopener">関連リンク</a></p>` : ""}
          `;

          list.appendChild(article);
        });
      })
      .catch(err => {
        console.error(err);
        document.getElementById("newsList").innerHTML =
          "<p>記事の取得に失敗しました。</p>";
      });
  </script>
</body>
</html>
