<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>News | やらはじ公式サイト</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header.css">

  <style>
    /* ===== Newsページ専用 ===== */
    .news-page {
      max-width: 900px;
      margin: 120px auto 80px;
      padding: 0 20px;
      box-sizing: border-box;
    }

    .news-page h1 {
      font-size: 2rem;
      margin-bottom: 32px;
    }

    .news-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
      width: 100%;
    }

    .news-item {
      width: 100%;
      padding: 20px;
      border: 1px solid var(--line, rgba(0,0,0,0.1));
      border-radius: 16px;
      cursor: pointer;
      transition: 0.2s;
      box-sizing: border-box;
    }

    .news-item:hover {
      background: color-mix(in srgb, var(--bg) 92%, transparent);
    }

    .news-meta {
      display: flex;
      gap: 12px;
      font-size: 0.8rem;
      margin-bottom: 6px;
      color: var(--sub, #777);
    }

    .news-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .news-excerpt {
      font-size: 0.9rem;
      color: var(--sub, #777);
      line-height: 1.6;
    }
  </style>
</head>

<body>

<!-- ===== Header（共通） ===== -->
<header class="site-header" id="site-header">
  <div class="header-inner">
    <div class="site-logo">やらはじ</div>

    <nav class="site-nav" id="site-nav">
      <a href="about.html">About</a>
      <a href="news.html" aria-current="page">News</a>
      <a href="schedule.html">Schedule</a>
      <a href="profile.html">Profile</a>
      <a href="guideline.html">Guideline</a>
      <a href="contact.html">Contact</a>
    </nav>

    <button class="menu-toggle" id="menu-toggle">≡</button>
  </div>
</header>

<!-- ===== Main ===== -->
<main class="news-page">
  <h1>News</h1>
  <div class="news-list" id="news-list">読み込み中…</div>
</main>

<!-- ===== Theme ===== -->
<button class="theme-toggle" id="theme-toggle">
  <span class="theme-icon" id="theme-icon">◐</span>
</button>

<!-- ===== Footer ===== -->
<div id="footer"></div>

<!-- ===== Scripts ===== -->
<script src="js/header.js"></script>
<script src="js/theme.js"></script>
<script src="common.js"></script>

<script>
const API_KEY = "ここにAPIキー";
const ENDPOINT = "https://yarahazi.microcms.io/api/v1/news?filters=publishedAt[exists]&orders=-date";

fetch(ENDPOINT, {
  headers: { "X-MICROCMS-API-KEY": API_KEY }
})
.then(res => res.json())
.then(data => {
  const list = document.getElementById("news-list");
  list.innerHTML = "";

  if (!data.contents || data.contents.length === 0) {
    list.innerHTML = "記事がありません";
    return;
  }

  data.contents.forEach(item => {
    const div = document.createElement("div");
    div.className = "news-item";
    div.onclick = () => {
      location.href = `news-detail.html?id=${item.id}`;
    };

    const date = item.date
      ? item.date.replace(/-/g, ".")
      : "";

    div.innerHTML = `
      <div class="news-meta">
        <span>${date}</span>
        <span>${item.category || ""}</span>
      </div>
      <div class="news-title">${item.title}</div>
      <div class="news-excerpt">
        ${item.body ? item.body.replace(/<[^>]*>?/gm, "").slice(0, 60) : ""}…
      </div>
    `;

    list.appendChild(div);
  });
})
.catch(() => {
  document.getElementById("news-list").innerHTML = "記事の取得に失敗しました";
});
</script>

</body>
</html>
