<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>News | やらはじ公式サイト</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header.css">

  <style>
    .container.news-page {
      max-width: 900px;
      margin: 100px auto 80px;
      padding: 0 20px;
    }

    .news-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
      width: 100%;
    }

    .news-item {
      width: 100%;
      max-width: 100%;
      padding: 18px 20px;
      border: 1px solid var(--line, rgba(0,0,0,0.1));
      border-radius: 16px;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }

    .news-item:hover {
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    }

    .news-meta {
      display: flex;
      gap: 12px;
      font-size: 0.8rem;
      margin-bottom: 6px;
      color: var(--sub, #777);
    }

    .news-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .news-excerpt {
      font-size: 0.9rem;
      color: var(--sub, #777);
      line-height: 1.6;
    }
  </style>
</head>

<body>

<header class="site-header" id="site-header">
  <div class="header-inner">
    <div class="site-logo">やらはじ</div>
    <nav class="site-nav" id="site-nav">
      <a href="about.html">About</a>
      <a href="news.html" aria-current="page">News</a>
      <a href="schedule.html">Schedule</a>
      <a href="profile.html">Profile</a>
      <a href="guideline.html">Guideline</a>
      <a href="contact.html">Contact</a>
    </nav>
    <button class="menu-toggle" id="menu-toggle">≡</button>
  </div>
</header>

<main class="container news-page">
  <h1>News</h1>
  <div class="news-list" id="news-list"></div>
</main>

<button class="theme-toggle" id="theme-toggle">
  <span class="theme-icon" id="theme-icon">◐</span>
</button>

<div id="footer"></div>

<script src="js/header.js"></script>
<script src="js/theme.js"></script>
<script src="/common.js"></script>
<script src="js/news.js"></script>

<script>
  // news.js のサンプル表示処理
  const newsList = document.getElementById("news-list");

  // ダミーデータ
  const newsItems = [
    { date: "2026-02-09", category: "Update", title: "サイトリニューアル完了", excerpt: "Newsカードの縦並びや日付処理などを改善しました。" },
    { date: "2026-02-08", category: "Info", title: "サーバー移行のお知らせ", excerpt: "GitHub Pages に完全移行しました。" },
    { date: "2026-02-07", category: "Update", title: "テーマ切替機能追加", excerpt: "ライト・ダークテーマをワンクリックで切替可能にしました。" }
  ];

  newsItems.forEach(item => {
    const date = item.date ? item.date.replace(/-/g, ".") : "";
    const html = `
      <div class="news-item">
        <div class="news-meta">
          <span>${date}</span>
          <span>${item.category}</span>
        </div>
        <div class="news-title">${item.title}</div>
        <div class="news-excerpt">${item.excerpt}</div>
      </div>
    `;
    newsList.insertAdjacentHTML("beforeend", html);
  });
</script>

</body>
</html>
